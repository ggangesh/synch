name: API CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/api-ci.yml"

jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level=high

      - run: pnpm -C apps/api typecheck

      - run: pnpm -C apps/api test:unit

      - run: pnpm -C apps/api test:integration
        env:
          BETTER_AUTH_URL: http://127.0.0.1:8787
          BETTER_AUTH_SECRET: ci-better-auth-secret-that-is-long-enough
          SYNC_TOKEN_SECRET: ci-sync-token-secret-that-is-long-enough
